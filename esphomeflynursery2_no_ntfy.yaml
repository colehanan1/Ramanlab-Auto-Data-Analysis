esphome:
  name: flynursery2
  friendly_name: FlyNursery2
  on_boot:
    then:
      - delay: 5s
      - lambda: |-
          id(fly_sun_brightness_pct).publish_state(id(sun_brightness_pct));
          id(heat_pad_watts).publish_state(id(heat_pad_watts_value));
      - script.execute: query_plug_state
      - script.execute: query_plug_metrics
      - delay: 2s
      - script.execute: set_sun_from_time

